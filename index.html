<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ana's Countdown</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app-shell">
      <div class="timer-card">
        <div class="display-panel">
          <div class="display-content">
            <div id="timeDisplay" class="time-display">00:00</div>

            <div class="manual-inputs">
              <label class="input-group inline-group">
                <span>Minutos</span>

                <input
                  id="minutesInput"
                  type="number"
                  min="0"
                  max="999"
                  value="25"
                />
              </label>

              <label class="input-group inline-group">
                <span>Segundos</span>

                <input
                  id="secondsInput"
                  type="number"
                  min="0"
                  max="59"
                  value="0"
                />
              </label>
            </div>
          </div>
        </div>

        <div class="preset-row">
          <button class="preset-button" data-min="5">5min</button>

          <button class="preset-button" data-min="10">10min</button>

          <button class="preset-button" data-min="25">25min</button>

          <button class="preset-button" data-min="50">50min</button>
        </div>

        <div class="action-row">
          <button id="startBtn" class="primary-button small-button">
            Iniciar
          </button>

          <button id="pauseBtn" class="secondary-button small-button">
            Pausar
          </button>

          <button id="resetBtn" class="ghost-button small-button">
            Resetar
          </button>
        </div>

        <div class="panel-toolbar">
          <button
            id="settingsToggle"
            class="icon-button"
            aria-label="Configurações"
          >
            ⚙
          </button>

          <button id="themeToggle" class="icon-button" aria-label="Tema">
            ☀
          </button>
        </div>

        <div id="settingsPanel" class="settings-panel" hidden>
          <div class="compact-notification">
            <div>
              <div class="notification-title">Notificação</div>

              <p class="notification-copy">
                Receber aviso quando o tempo terminar
              </p>
            </div>

            <button id="notifyBtn" class="secondary-button small-button">
              Ativar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
