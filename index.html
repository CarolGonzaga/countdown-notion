<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ana's Countdown</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app-shell">
      <div class="timer-card">
        <div class="display-panel">
          <div class="display-content">
            <div id="timeDisplay" class="time-display">00:00</div>

            <div class="manual-inputs">
              <label class="input-group">
                <span>Minutos</span>
                <input
                  id="minutesInput"
                  type="number"
                  min="0"
                  max="999"
                  value="0"
                />
              </label>

              <label class="input-group">
                <span>Segundos</span>
                <input
                  id="secondsInput"
                  type="number"
                  min="0"
                  max="59"
                  value="0"
                />
              </label>
            </div>
          </div>
        </div>

        <div class="preset-row">
          <button class="preset-button" data-min="5">5 min</button>
          <button class="preset-button" data-min="10">10 min</button>
          <button class="preset-button" data-min="25">25 min</button>
          <button class="preset-button" data-min="50">50 min</button>
        </div>

        <div class="action-row">
          <button id="startBtn" class="primary-button">Iniciar</button>

          <button id="pauseBtn" class="secondary-button">Pausar</button>

          <button id="resetBtn" class="ghost-button">Resetar</button>
        </div>

        <div class="panel-toolbar">
          <button
            id="settingsToggle"
            class="icon-button"
            aria-label="Configurações"
          >
            ⚙
          </button>

          <button id="themeToggle" class="icon-button" aria-label="Tema">
            ☀
          </button>
        </div>

        <div id="settingsPanel" class="settings-panel" hidden>
          <div class="sound-setting">
            <label class="sound-label"> Som do alarme </label>

            <div class="sound-row">
              <select id="soundSelect">
                <option value="system">Sistema</option>
                <option value="chime">Chime</option>
                <option value="digital">Digital</option>
                <option value="ana">Ana</option>
              </select>

              <button
                id="testSoundBtn"
                class="icon-button"
                aria-label="Testar som"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>

                  <path d="M19 9a5 5 0 0 1 0 6"></path>

                  <path d="M15 9a3 3 0 0 1 0 6"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
